<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suyash's Unit Convertor</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="bckg">
        <div class="top">
            <h1>Metric/Imperial Unit Conversion</h1>
            <input type="text" id="input" placeholder="00" required>
            <button id="btn">Convert</button>
        </div>
        <div class="bottom">
            <div class="length">
                <h3>Length (Meter/Feet)</h3>
                <p id="length">00 meters = 00.000 feet | 00 feet = 00.000 meters</p>
            </div>
            <div class="volume">
                <h3>Volume (Liters/Gallons)</h3>
                <p id="volume">00 liters = 00.000 gallons | 00 gallons = 00.000 liters</p>
            </div>
            <div class="mass">
                <h3>Mass (Kilograms/Pounds)</h3>
                <p id="mass">00 kilos = 00.000 pounds | 00 pounds = 00.000 kilos</p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
